  <body class="bg-void text-ink font-sans antialiased">
    <script type="text/javascript">
      // Contraparte de public/404.html: si llegamos aquí con el path
      // codificado en el querystring (?/campos-vectoriales), lo restauramos
      // con history.replaceState ANTES de que se ejecute main.jsx, para que
      // React Router vea la URL real (/VectorLab/campos-vectoriales) desde
      // el primer render en lugar de la codificada.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <div id="root"></div>
  </body>
